<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Màn Hình Bếp</title>
<script src="/socket.io/socket.io.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --card: #1c2128;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --pending: #f0a500;
    --preparing: #58a6ff;
    --ready: #3fb950;
    --accent: #f0a500;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; height: 100vh; overflow: hidden; }

  .kitchen-header {
    background: var(--surface); border-bottom: 2px solid var(--border);
    padding: 12px 20px; display: flex; align-items: center; justify-content: space-between;
  }
  .kitchen-header h1 { font-size: 20px; font-weight: 700; }
  .header-stats { display: flex; gap: 20px; }
  .stat { text-align: center; }
  .stat-num { font-size: 22px; font-weight: 700; }
  .stat-label { font-size: 11px; color: var(--muted); }
  .conn-status { display: flex; align-items: center; gap: 6px; font-size: 13px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ready); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  .columns {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
    height: calc(100vh - 65px);
  }

  .column {
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .column:last-child { border-right: none; }

  .col-header {
    padding: 12px 16px; font-size: 13px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px;
    border-bottom: 2px solid;
    display: flex; justify-content: space-between; align-items: center;
    flex-shrink: 0;
  }
  .col-header.pending { color: var(--pending); border-color: var(--pending); background: rgba(240,165,0,0.05); }
  .col-header.preparing { color: var(--preparing); border-color: var(--preparing); background: rgba(88,166,255,0.05); }
  .col-header.ready { color: var(--ready); border-color: var(--ready); background: rgba(63,185,80,0.05); }

  .col-badge {
    font-size: 12px; font-weight: 800; padding: 2px 8px;
    border-radius: 10px;
  }
  .pending .col-badge { background: rgba(240,165,0,0.2); color: var(--pending); }
  .preparing .col-badge { background: rgba(88,166,255,0.2); color: var(--preparing); }
  .ready .col-badge { background: rgba(63,185,80,0.2); color: var(--ready); }

  .col-body { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
  .col-body::-webkit-scrollbar { width: 4px; }
  .col-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Order card */
  .order-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
    animation: slideIn 0.35s ease;
  }
  @keyframes slideIn { from { opacity:0; transform:translateY(-12px); } to { opacity:1; transform:translateY(0); } }
  .card-header {
    padding: 10px 14px; display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .card-id { font-size: 16px; font-weight: 800; color: var(--accent); }
  .card-table { font-size: 13px; color: var(--muted); }
  .card-time { font-size: 11px; color: var(--muted); }
  .card-items { padding: 10px 14px; }
  .order-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
    gap: 8px;
  }
  .order-item:last-child { border-bottom: none; }
  .oi-left { display: flex; align-items: center; gap: 8px; flex: 1; }
  .oi-emoji { width: 44px; height: 44px; flex-shrink: 0; }
  .oi-emoji img { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; }
  .oi-name { font-size: 13px; font-weight: 500; }
  .oi-qty { font-size: 13px; color: var(--muted); }
  .item-status-btn {
    font-size: 11px; font-weight: 700; padding: 3px 10px;
    border-radius: 20px; border: none; cursor: pointer;
    font-family: inherit; white-space: nowrap; transition: all 0.2s;
  }
  .item-status-btn.pending { background: rgba(240,165,0,0.15); color: var(--pending); border: 1px solid rgba(240,165,0,0.3); }
  .item-status-btn.preparing { background: rgba(88,166,255,0.15); color: var(--preparing); border: 1px solid rgba(88,166,255,0.3); }
  .item-status-btn.ready { background: rgba(63,185,80,0.15); color: var(--ready); border: 1px solid rgba(63,185,80,0.3); }
  .card-note {
    margin: 0 14px 10px; padding: 8px 10px;
    background: rgba(240,165,0,0.07); border: 1px solid rgba(240,165,0,0.2);
    border-radius: 8px; font-size: 12px; color: var(--accent);
  }
  .card-actions { padding: 10px 14px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
  .action-btn {
    flex: 1; padding: 8px; border-radius: 8px; border: none;
    font-family: inherit; font-size: 12px; font-weight: 700; cursor: pointer;
  }
  .btn-prepare { background: rgba(88,166,255,0.15); color: var(--preparing); border: 1px solid rgba(88,166,255,0.3); }
  .btn-ready { background: rgba(63,185,80,0.15); color: var(--ready); border: 1px solid rgba(63,185,80,0.3); }
  .btn-complete { background: rgba(63,185,80,0.15); color: var(--ready); border: 1px solid rgba(63,185,80,0.3); }

  .elapsed {
    font-size: 11px; font-weight: 700;
    padding: 2px 7px; border-radius: 8px;
  }
  .elapsed.ok { background: rgba(63,185,80,0.15); color: var(--ready); }
  .elapsed.warn { background: rgba(240,165,0,0.15); color: var(--pending); }
  .elapsed.late { background: rgba(239,68,68,0.15); color: #f87171; }

  .empty-col { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; }
  .empty-col .e-icon { font-size: 40px; margin-bottom: 8px; }

  .sound-btn {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); padding: 6px 14px; border-radius: 8px;
    font-family: inherit; font-size: 12px; font-weight: 600; cursor: pointer;
  }

  /* Mobile Responsive */
  @media (max-width: 768px) {
    body { height: auto; min-height: 100vh; }
    
    .kitchen-header {
      flex-direction: column;
      gap: 10px;
      padding: 10px 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .kitchen-header h1 { font-size: 16px; }
    .header-stats { width: 100%; justify-content: space-around; }
    .stat-num { font-size: 18px; }
    .stat-label { font-size: 10px; }
    
    .columns {
      grid-template-columns: 1fr;
      height: auto;
      display: flex;
      flex-direction: column;
    }
    .column {
      border-right: none;
      border-bottom: 1px solid var(--border);
      min-height: 200px;
      max-height: 300px;
    }
    .col-header { padding: 10px 12px; font-size: 12px; }
    .col-body { padding: 8px; gap: 8px; }
    
    .order-card { border-radius: 10px; }
    .card-header { padding: 8px 10px; }
    .card-id { font-size: 14px; }
    .card-items { padding: 8px 10px; }
    .oi-emoji { width: 36px; height: 36px; }
    .oi-name { font-size: 12px; }
    .item-status-btn { padding: 4px 8px; font-size: 10px; }
    .card-actions { padding: 8px 10px; }
    .action-btn { padding: 6px; font-size: 11px; }
    
    .empty-col { padding: 20px 10px; }
    .empty-col .e-icon { font-size: 30px; }
  }
</style>
</head>
<body>

<div class="kitchen-header">
  <h1>👨‍🍳 Màn Hình Bếp</h1>
  <div class="header-stats">
    <div class="stat"><div class="stat-num" id="totalPending">0</div><div class="stat-label">Chờ xử lý</div></div>
    <div class="stat"><div class="stat-num" id="totalPreparing">0</div><div class="stat-label">Đang nấu</div></div>
    <div class="stat"><div class="stat-num" id="totalReady">0</div><div class="stat-label">Sẵn sàng</div></div>
  </div>
  <div style="display:flex;gap:10px;align-items:center;">
    <button class="sound-btn" onclick="toggleSound()" id="soundBtn">🔔 Âm thanh: BẬT</button>
    <div class="conn-status"><div class="dot" id="connDot"></div><span id="connText">Đang kết nối...</span></div>
  </div>
</div>

<div class="columns">
  <div class="column">
    <div class="col-header pending">🟡 Đơn mới<span class="col-badge" id="countPending">0</span></div>
    <div class="col-body" id="colPending"></div>
  </div>
  <div class="column">
    <div class="col-header preparing">🔵 Đang nấu<span class="col-badge" id="countPreparing">0</span></div>
    <div class="col-body" id="colPreparing"></div>
  </div>
  <div class="column">
    <div class="col-header ready">🟢 Xong / Chờ phục vụ<span class="col-badge" id="countReady">0</span></div>
    <div class="col-body" id="colReady"></div>
  </div>
</div>

<script>
const socket = io('https://banh-mi-cha-ca-nong.onrender.com');
let orders = {};
let soundEnabled = true;
let tickInterval;

// Audio context for notification sound
function playNotif() {
  if (!soundEnabled) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [523, 659, 784].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq; osc.type = 'sine';
      gain.gain.setValueAtTime(0.3, ctx.currentTime + i * 0.15);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.15 + 0.3);
      osc.start(ctx.currentTime + i * 0.15);
      osc.stop(ctx.currentTime + i * 0.15 + 0.3);
    });
  } catch(e) {}
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  document.getElementById('soundBtn').textContent = `🔔 Âm thanh: ${soundEnabled ? 'BẬT' : 'TẮT'}`;
}

socket.emit('join_kitchen');

socket.on('connect', () => {
  document.getElementById('connText').textContent = 'Đã kết nối';
  document.getElementById('connDot').style.background = 'var(--ready)';
});
socket.on('disconnect', () => {
  document.getElementById('connText').textContent = 'Mất kết nối!';
  document.getElementById('connDot').style.background = 'var(--late, #f87171)';
});

// Load existing orders
fetch('/api/orders')
  .then(r => r.json())
  .then(data => {
    data.filter(o => o.status !== 'paid').forEach(o => { orders[o.orderId] = o; });
    render();
    startElapsedTimer();
  });

socket.on('new_order', (order) => {
  orders[order.orderId] = order;
  playNotif();
  render();
});

socket.on('order_updated', (order) => {
  if (order.status !== 'paid') orders[order.orderId] = order;
  else delete orders[order.orderId];
  render();
});

function getElapsed(createdAt) {
  const mins = Math.floor((Date.now() - new Date(createdAt)) / 60000);
  return mins;
}

function elapsedClass(mins) {
  if (mins < 10) return 'ok';
  if (mins < 20) return 'warn';
  return 'late';
}

function nextStatus(current) {
  if (current === 'pending') return 'preparing';
  if (current === 'preparing') return 'ready';
  return null;
}

function updateOrderStatus(orderId, status) {
  fetch(`/api/orders/${orderId}/status`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status })
  });
}

function updateItemStatus(orderId, idx, status) {
  fetch(`/api/orders/${orderId}/items/${idx}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status })
  });
}

function buildCard(order) {
  const elapsed = getElapsed(order.createdAt);
  const eClass = elapsedClass(elapsed);
  const nextStat = nextStatus(order.status);

  return `
    <div class="order-card" id="card-${order.orderId}">
      <div class="card-header">
        <div>
          <div class="card-id">#${order.orderId}</div>
          <div class="card-table">${order.tableName}</div>
        </div>
        <div style="text-align:right;">
          <div class="elapsed ${eClass}">${elapsed}p trước</div>
          <div class="card-time">${new Date(order.createdAt).toLocaleTimeString('vi', {hour:'2-digit',minute:'2-digit'})}</div>
        </div>
      </div>
      <div class="card-items">
        ${order.items.map((item, idx) => `
          <div class="order-item">
            <div class="oi-left">
              <span class="oi-emoji"><img src="${item.image}"></span>
              <span class="oi-name">${item.name}</span>
              <span class="oi-qty">×${item.quantity}</span>
            </div>
            <button class="item-status-btn ${item.status}" onclick="cycleItem('${order.orderId}',${idx},'${item.status}')">
              ${item.status === 'pending' ? '⏳ Chờ' : item.status === 'preparing' ? '🔥 Đang nấu' : '✅ Xong'}
            </button>
          </div>
        `).join('')}
      </div>
      ${order.note ? `<div class="card-note">📝 ${order.note}</div>` : ''}
      <div class="card-actions">
        ${order.status === 'pending' ? `<button class="action-btn btn-prepare" onclick="updateOrderStatus('${order.orderId}','preparing')">🔥 Bắt đầu nấu</button>` : ''}
        ${order.status === 'preparing' ? `<button class="action-btn btn-ready" onclick="updateOrderStatus('${order.orderId}','ready')">✅ Hoàn thành</button>` : ''}
        ${order.status === 'ready' ? `<div style="text-align:center;font-size:12px;color:var(--ready);font-weight:700;width:100%;">✅ Đã sẵn sàng phục vụ</div>` : ''}
      </div>
    </div>
  `;
}

function cycleItem(orderId, idx, currentStatus) {
  const next = currentStatus === 'pending' ? 'preparing' : currentStatus === 'preparing' ? 'ready' : 'pending';
  updateItemStatus(orderId, idx, next);
}

function render() {
  const pending = Object.values(orders).filter(o => o.status === 'pending');
  const preparing = Object.values(orders).filter(o => o.status === 'preparing');
  const ready = Object.values(orders).filter(o => o.status === 'ready');

  document.getElementById('colPending').innerHTML = pending.length
    ? pending.sort((a,b)=>new Date(a.createdAt)-new Date(b.createdAt)).map(buildCard).join('')
    : '<div class="empty-col"><div class="e-icon">😌</div>Không có đơn mới</div>';

  document.getElementById('colPreparing').innerHTML = preparing.length
    ? preparing.map(buildCard).join('')
    : '<div class="empty-col"><div class="e-icon">🍳</div>Chưa có món đang nấu</div>';

  document.getElementById('colReady').innerHTML = ready.length
    ? ready.map(buildCard).join('')
    : '<div class="empty-col"><div class="e-icon">🛎️</div>Chưa có món sẵn sàng</div>';

  // Update counts
  document.getElementById('countPending').textContent = pending.length;
  document.getElementById('countPreparing').textContent = preparing.length;
  document.getElementById('countReady').textContent = ready.length;
  document.getElementById('totalPending').textContent = pending.length;
  document.getElementById('totalPreparing').textContent = preparing.length;
  document.getElementById('totalReady').textContent = ready.length;
}

function startElapsedTimer() {
  if (tickInterval) clearInterval(tickInterval);
  tickInterval = setInterval(render, 60000); // refresh mỗi 1 phút
}
</script>
</body>
</html>

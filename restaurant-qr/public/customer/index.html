<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Đặt Món</title>
<script src="/socket.io/socket.io.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0f0e17;
    --surface: #1a1a2e;
    --card: #16213e;
    --accent: #ff6b35;
    --accent2: #ffd166;
    --text: #fffffe;
    --muted: #a7a9be;
    --green: #06d6a0;
    --red: #ef233c;
    --border: rgba(255,255,255,0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Nunito', sans-serif; min-height: 100vh; }

  /* Header */
  .header {
    background: linear-gradient(135deg, var(--accent) 0%, #e63946 100%);
    padding: 16px 20px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 20px rgba(255,107,53,0.4);
  }
  .header-top { display: flex; justify-content: space-between; align-items: center; }
  .restaurant-name { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; }
  .table-badge {
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.3);
    padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 700;
  }

  /* Category tabs */
  .categories {
    display: flex; gap: 8px; padding: 14px 16px;
    overflow-x: auto; scrollbar-width: none;
    background: var(--surface); border-bottom: 1px solid var(--border);
    position: sticky; top: 65px; z-index: 99;
  }
  .categories::-webkit-scrollbar { display: none; }
  .cat-btn {
    background: var(--card); border: 1px solid var(--border);
    color: var(--muted); padding: 6px 16px; border-radius: 20px;
    font-family: inherit; font-size: 13px; font-weight: 600;
    white-space: nowrap; cursor: pointer; transition: all 0.2s;
  }
  .cat-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

  /* Menu grid */
  .menu-section { padding: 16px; }
  .section-title { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
  .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .menu-item {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden; cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
  }
  .menu-item:active { transform: scale(0.97); }
  .menu-item.unavailable { opacity: 0.45; pointer-events: none; }
  .item-emoji { font-size: 48px; text-align: center; padding: 16px 0 8px; background: var(--surface); }
  .item-info { padding: 10px 12px 12px; }
  .item-name { font-size: 13px; font-weight: 700; line-height: 1.3; margin-bottom: 6px; }
  .item-price { font-size: 15px; font-weight: 900; color: var(--accent); }
  .item-add-btn {
    position: absolute; bottom: 10px; right: 10px;
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--accent); border: none; color: white;
    font-size: 18px; line-height: 28px; text-align: center;
    cursor: pointer; transition: transform 0.15s;
  }
  .item-add-btn:active { transform: scale(1.2); }
  .in-cart-badge {
    position: absolute; top: 8px; right: 8px;
    background: var(--accent2); color: #1a1a2e;
    font-size: 11px; font-weight: 900;
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }

  /* Cart bar */
  .cart-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 12px 16px; background: var(--surface);
    border-top: 1px solid var(--border);
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(.4,0,.2,1);
    z-index: 200;
  }
  .cart-bar.visible { transform: translateY(0); }
  .cart-btn {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--accent), #e63946);
    border: none; border-radius: 14px; color: white;
    font-family: inherit; font-size: 16px; font-weight: 800;
    cursor: pointer; display: flex; justify-content: space-between; align-items: center;
    box-shadow: 0 4px 20px rgba(255,107,53,0.5);
  }
  .cart-count-bubble {
    background: white; color: var(--accent);
    width: 26px; height: 26px; border-radius: 50%;
    font-size: 14px; font-weight: 900;
    display: flex; align-items: center; justify-content: center;
  }

  /* Modal overlay */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.25s;
  }
  .overlay.visible { opacity: 1; pointer-events: all; }

  /* Cart drawer */
  .cart-drawer {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface); border-radius: 24px 24px 0 0;
    z-index: 400; max-height: 85vh; overflow-y: auto;
    transform: translateY(100%); transition: transform 0.35s cubic-bezier(.4,0,.2,1);
    padding-bottom: env(safe-area-inset-bottom, 16px);
  }
  .cart-drawer.open { transform: translateY(0); }
  .drawer-handle {
    width: 40px; height: 4px; background: var(--border);
    border-radius: 2px; margin: 12px auto 0;
  }
  .drawer-header { padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .drawer-header h2 { font-size: 18px; font-weight: 900; }
  .cart-items { padding: 12px 20px; }
  .cart-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 0; border-bottom: 1px solid var(--border);
  }
  .ci-emoji { font-size: 32px; }
  .ci-info { flex: 1; }
  .ci-name { font-size: 14px; font-weight: 700; }
  .ci-price { font-size: 13px; color: var(--muted); }
  .qty-control { display: flex; align-items: center; gap: 8px; }
  .qty-btn {
    width: 30px; height: 30px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--card);
    color: var(--text); font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .qty-num { font-size: 15px; font-weight: 800; min-width: 20px; text-align: center; }
  .note-area {
    margin: 12px 20px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px;
  }
  .note-area label { font-size: 12px; font-weight: 700; color: var(--muted); display: block; margin-bottom: 6px; }
  .note-area textarea {
    width: 100%; background: transparent; border: none;
    color: var(--text); font-family: inherit; font-size: 14px;
    resize: none; outline: none; min-height: 60px;
  }
  .cart-footer { padding: 12px 20px; }
  .total-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 14px;
  }
  .total-label { font-size: 14px; color: var(--muted); font-weight: 600; }
  .total-amount { font-size: 22px; font-weight: 900; color: var(--accent2); }
  .order-btn {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, var(--green), #05a880);
    border: none; border-radius: 14px; color: white;
    font-family: inherit; font-size: 16px; font-weight: 900;
    cursor: pointer; letter-spacing: 0.5px;
    box-shadow: 0 4px 20px rgba(6,214,160,0.4);
  }

  /* Success screen */
  .success-screen {
    display: none; position: fixed; inset: 0;
    background: var(--bg); z-index: 500;
    flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 24px;
  }
  .success-screen.show { display: flex; }
  .success-icon { font-size: 80px; margin-bottom: 20px; animation: bounceIn 0.6s; }
  @keyframes bounceIn {
    0% { transform: scale(0); } 70% { transform: scale(1.2); } 100% { transform: scale(1); }
  }
  .success-screen h2 { font-size: 28px; font-weight: 900; margin-bottom: 10px; }
  .success-screen p { color: var(--muted); font-size: 15px; line-height: 1.6; }
  .order-id-box {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 24px; margin: 20px 0;
  }
  .order-id-box span { color: var(--muted); font-size: 13px; display: block; margin-bottom: 4px; }
  .order-id-box strong { font-size: 28px; font-weight: 900; color: var(--accent2); letter-spacing: 3px; }
  .track-btn {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); padding: 12px 24px; border-radius: 12px;
    font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 8px;
  }

  /* Order status tracker */
  .status-tracker {
    display: none; background: var(--card);
    border: 1px solid var(--border); border-radius: 16px;
    margin: 16px; padding: 16px;
  }
  .status-tracker.show { display: block; }
  .tracker-title { font-size: 13px; font-weight: 700; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
  .status-steps { display: flex; justify-content: space-between; position: relative; }
  .status-steps::before {
    content: ''; position: absolute; top: 14px; left: 10%; right: 10%;
    height: 2px; background: var(--border); z-index: 0;
  }
  .step {
    flex: 1; text-align: center; position: relative; z-index: 1;
  }
  .step-dot {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--card); border: 2px solid var(--border);
    margin: 0 auto 6px; display: flex; align-items: center; justify-content: center;
    font-size: 14px; transition: all 0.3s;
  }
  .step.active .step-dot { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 12px rgba(255,107,53,0.6); }
  .step.done .step-dot { background: var(--green); border-color: var(--green); }
  .step-label { font-size: 10px; font-weight: 700; color: var(--muted); }
  .step.active .step-label, .step.done .step-label { color: var(--text); }

  .pb-cart { padding-bottom: 80px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="restaurant-name">Bánh mì chả cá</div>
    <div class="table-badge" id="tableBadge">Mang đi</div>
  </div>
</div>

<div class="categories" id="categories">
  <button class="cat-btn active" onclick="filterCategory('all')">Tất cả</button>
</div>

<!-- Order status tracker -->
<div class="status-tracker" id="statusTracker">
  <div class="tracker-title"> Trạng thái đơn #<span id="trackOrderId"></span></div>
  <div class="status-steps">
    <div class="step" id="step-pending">
      <div class="step-dot">📝</div>
      <div class="step-label">Đã nhận</div>
    </div>
    <div class="step" id="step-preparing">
      <div class="step-dot">👨‍🍳</div>
      <div class="step-label">Đang nấu</div>
    </div>
    <div class="step" id="step-ready">
      <div class="step-dot">✅</div>
      <div class="step-label">Sẵn sàng</div>
    </div>
    <div class="step" id="step-paid">
      <div class="step-dot">💰</div>
      <div class="step-label">Đã thanh toán</div>
    </div>
  </div>
</div>

<div class="menu-section pb-cart" id="menuSection"></div>

<!-- Cart bar -->
<div class="cart-bar" id="cartBar">
  <button class="cart-btn" onclick="openCart()">
    <span>🛒 Xem giỏ hàng</span>
    <div style="display:flex;align-items:center;gap:8px;">
      <span id="cartTotal">0đ</span>
      <div class="cart-count-bubble" id="cartCount">0</div>
    </div>
  </button>
</div>

<!-- Overlay -->
<div class="overlay" id="overlay" onclick="closeCart()"></div>

<!-- Cart drawer -->
<div class="cart-drawer" id="cartDrawer">
  <div class="drawer-handle"></div>
  <div class="drawer-header">
    <h2>🛒 Giỏ hàng của bạn</h2>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="note-area">
    <label>📝 Ghi chú cho bếp</label>
    <textarea id="noteInput" placeholder="VD: Ít cay, không hành, thêm đá..."></textarea>
  </div>
  <div class="cart-footer">
    <div class="total-row">
      <span class="total-label">Tổng cộng</span>
      <span class="total-amount" id="drawerTotal">0đ</span>
    </div>
    <button class="order-btn" onclick="placeOrder()">🍽️ ĐẶT MÓN NGAY</button>
  </div>
</div>

<!-- Success screen -->
<div class="success-screen" id="successScreen">
  <div class="success-icon">🎉</div>
  <h2>Đặt món thành công!</h2>
  <p>Bếp đã nhận được đơn của bạn<br/>và đang chuẩn bị. Vui lòng chờ nhé!</p>
  <div class="order-id-box">
    <span>Mã đơn hàng</span>
    <strong id="successOrderId">------</strong>
  </div>
  <button class="track-btn" onclick="backToMenu()">← Quay lại menu</button>
</div>

<script>
const params = new URLSearchParams(location.search);
const tableId = params.get('table') || 'table_1';
const socket = io('https://banh-mi-cha-ca-nong.onrender.com');

let menu = [];
let cart = []; // [{id, name, price, quantity, image}]
let currentOrderId = null;

// Kết nối socket
socket.emit('join_table', { tableId });
if (tableId === 'takeaway') {
    document.getElementById('tableBadge').textContent = 'Khách Mang Đi';
} else {
    document.getElementById('tableBadge').textContent = 'Bàn ' + tableId.replace('table_', '');
}

// Nhận xác nhận order
socket.on('order_confirmed', (order) => {
  currentOrderId = order.orderId;
  document.getElementById('successOrderId').textContent = order.orderId;
  document.getElementById('successScreen').classList.add('show');
  document.getElementById('trackOrderId').textContent = order.orderId;
  updateStatusTracker('pending');
  cart = [];
  updateCartUI();
});

// Cập nhật trạng thái order
socket.on('order_updated', (order) => {
  if (order.orderId === currentOrderId) {
    updateStatusTracker(order.status);
  }
});

// Cập nhật menu realtime
socket.on('menu_updated', (newMenu) => {
  menu = newMenu;
  renderMenu();
});

function updateStatusTracker(status) {
  document.getElementById('statusTracker').classList.add('show');
  const steps = ['pending', 'preparing', 'ready', 'paid'];
  const idx = steps.indexOf(status);
  steps.forEach((s, i) => {
    const el = document.getElementById('step-' + s);
    el.classList.remove('active', 'done');
    if (i < idx) el.classList.add('done');
    else if (i === idx) el.classList.add('active');
  });
}

// Load menu
fetch('/api/menu')
  .then(r => r.json())
  .then(data => {
    menu = data;
    renderCategories();
    renderMenu();
  });

let activeCategory = 'all';

function renderCategories() {
  const cats = ['Tất cả', ...new Set(menu.map(m => m.category))];
  const container = document.getElementById('categories');
  container.innerHTML = '';
  cats.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (i === 0 ? ' active' : '');
    btn.textContent = c;
    btn.onclick = () => filterCategory(i === 0 ? 'all' : c, btn);
    container.appendChild(btn);
  });
}

function filterCategory(cat, btn) {
  activeCategory = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderMenu();
}

function renderMenu() {
  const filtered = activeCategory === 'all' ? menu : menu.filter(m => m.category === activeCategory);
  const cats = activeCategory === 'all' ? [...new Set(menu.map(m => m.category))] : [activeCategory];
  const section = document.getElementById('menuSection');
  section.innerHTML = '';

  cats.forEach(cat => {
    const items = filtered.filter(m => m.category === cat);
    if (!items.length) return;
    const div = document.createElement('div');
    div.innerHTML = `<div class="section-title">${cat}</div><div class="menu-grid">${
      items.map(item => {
        const inCart = cart.find(c => c.id === item.id);
        return `<div class="menu-item ${item.available ? '' : 'unavailable'}" onclick="addToCart(${item.id})">
          <div class="item-emoji">${item.image}</div>
          ${inCart ? `<div class="in-cart-badge">${inCart.quantity}</div>` : ''}
          <div class="item-info">
            <div class="item-name">${item.name}</div>
            <div class="item-price">${item.price.toLocaleString('vi')}đ</div>
          </div>
          <button class="item-add-btn">+</button>
        </div>`;
      }).join('')
    }</div>`;
    section.appendChild(div);
  });
}

function addToCart(itemId) {
  const item = menu.find(m => m.id === itemId);
  if (!item) return;
  const existing = cart.find(c => c.id === itemId);
  if (existing) existing.quantity++;
  else cart.push({ ...item, quantity: 1 });
  updateCartUI();
  renderMenu(); // re-render để cập nhật badge

  // Animate
  const btn = event.target.closest('.menu-item')?.querySelector('.item-add-btn');
  if (btn) { btn.style.transform = 'scale(1.4)'; setTimeout(() => btn.style.transform = '', 200); }
}

function updateCartUI() {
  const total = cart.reduce((s, i) => s + i.price * i.quantity, 0);
  const count = cart.reduce((s, i) => s + i.quantity, 0);
  document.getElementById('cartTotal').textContent = total.toLocaleString('vi') + 'đ';
  document.getElementById('cartCount').textContent = count;
  document.getElementById('drawerTotal').textContent = total.toLocaleString('vi') + 'đ';
  const bar = document.getElementById('cartBar');
  if (count > 0) bar.classList.add('visible'); else bar.classList.remove('visible');
  renderCartItems();
}

function renderCartItems() {
  const container = document.getElementById('cartItems');
  if (!cart.length) { container.innerHTML = '<p style="color:var(--muted);text-align:center;padding:20px;">Chưa có món nào</p>'; return; }
  container.innerHTML = cart.map((item, idx) => `
    <div class="cart-item">
      <div class="ci-emoji">${item.image}</div>
      <div class="ci-info">
        <div class="ci-name">${item.name}</div>
        <div class="ci-price">${item.price.toLocaleString('vi')}đ / món</div>
      </div>
      <div class="qty-control">
        <button class="qty-btn" onclick="changeQty(${idx},-1)">−</button>
        <span class="qty-num">${item.quantity}</span>
        <button class="qty-btn" onclick="changeQty(${idx},1)">+</button>
      </div>
    </div>
  `).join('');
}

function changeQty(idx, delta) {
  cart[idx].quantity += delta;
  if (cart[idx].quantity <= 0) cart.splice(idx, 1);
  updateCartUI();
  renderMenu();
}

function openCart() {
  document.getElementById('cartDrawer').classList.add('open');
  document.getElementById('overlay').classList.add('visible');
  renderCartItems();
}

function closeCart() {
  document.getElementById('cartDrawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('visible');
}

function placeOrder() {
  if (!cart.length) return;
  const note = document.getElementById('noteInput').value;
  socket.emit('place_order', {
    tableId,
    items: cart.map(i => ({ id: i.id, name: i.name, price: i.price, quantity: i.quantity, image: i.image })),
    note
  });
  closeCart();
}

function backToMenu() {
  document.getElementById('successScreen').classList.remove('show');
}
</script>
</body>
</html>

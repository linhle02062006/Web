<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Đặt Món - Bánh Mì QR</title>
<meta name="description" content="Đặt món trực tuyến qua QR code"/>
<script src="/socket.io/socket.io.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{
  /* Starbucks-inspired warm neutral palette */
  --bg:#f2f0eb;
  --surface:#edebe9;
  --card:#ffffff;
  --accent:#006241;
  --accent2:#00754a;
  --text:#1e3932;
  --muted:#6b7280;
  --green:#34d399;
  --red:#c82014;
  --border:rgba(0,0,0,0.08);
  --radius:12px;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.05);
  --shadow-md:0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg:0 8px 24px rgba(0,0,0,0.12)
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;min-height:100vh;-webkit-tap-highlight-color:transparent;overflow-x:hidden}
::-webkit-scrollbar{width:0;height:0}

.header{background:linear-gradient(135deg,#006241 0%,#1e3932 100%);padding:18px 20px 14px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-md)}
.header-row{display:flex;justify-content:space-between;align-items:center}
.brand{font-size:18px;font-weight:800;letter-spacing:-0.16px}
.table-pill{background:rgba(255,255,255,.18);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.25);padding:4px 14px;border-radius:20px;font-size:12px;font-weight:700}

.cats{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;scrollbar-width:none;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:56px;z-index:99;box-shadow:var(--shadow-sm)}
.cat-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:8px 16px;border-radius:50px;font-family:inherit;font-size:13px;font-weight:600;white-space:nowrap;cursor:pointer;transition:all .2s ease}
.cat-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.cat-btn:hover:not(.active){border-color:var(--accent);color:var(--accent)}

.menu-area{padding:16px}
.sec-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin:24px 0 12px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:24px}
@media (min-width:640px){.grid{grid-template-columns:repeat(3,1fr);gap:20px}}
@media (min-width:1024px){.grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .2s ease;position:relative;box-shadow:var(--shadow-sm)}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.card:active{transform:scale(.98)}
.card-img{width:100%;height:120px;background:linear-gradient(135deg,#edebe9,#e5e3df);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-img .placeholder-icon{font-size:14px;color:rgba(0,0,0,0.25);font-weight:600}
.card-body{padding:12px 14px 14px}
.card-name{font-size:14px;font-weight:600;line-height:1.4;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:var(--text)}
.card-price{font-size:16px;font-weight:800;color:var(--accent)}
.card-plus{position:absolute;bottom:12px;right:12px;width:32px;height:32px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:18px;line-height:32px;text-align:center;cursor:pointer;box-shadow:var(--shadow-md);transition:all .2s ease}
.card-plus:hover{background:var(--accent2);transform:scale(1.1)}
.card-plus:active{transform:scale(1.05)}
.card-qty{position:absolute;top:8px;right:8px;background:var(--accent2);color:#fff;font-size:11px;font-weight:700;min-width:22px;height:22px;border-radius:11px;display:flex;align-items:center;justify-content:center;padding:0 5px}

.cart-bar{position:fixed;bottom:0;left:0;right:0;padding:12px 16px;padding-bottom:calc(12px + env(safe-area-inset-bottom,0px));background:var(--card);border-top:1px solid var(--border);transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:200;box-shadow:0 -4px 20px rgba(0,0,0,0.1)}
.cart-bar.show{transform:translateY(0)}
.cart-main-btn{width:100%;padding:14px 18px;background:linear-gradient(135deg,var(--accent),#1e3932);border:none;border-radius:var(--radius);color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;display:flex;justify-content:space-between;align-items:center;box-shadow:var(--shadow-md)}
.cart-bubble{background:#fff;color:var(--accent);width:26px;height:26px;border-radius:50%;font-size:13px;font-weight:900;display:flex;align-items:center;justify-content:center}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.show{opacity:1;pointer-events:all}

.drawer{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:20px 20px 0 0;z-index:400;max-height:85vh;overflow-y:auto;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);padding-bottom:env(safe-area-inset-bottom,16px);box-shadow:0 -8px 40px rgba(0,0,0,0.15)}
.drawer.open{transform:translateY(0)}
.drawer-bar{width:40px;height:4px;background:rgba(0,0,0,0.15);border-radius:2px;margin:12px auto 0}
.drawer-head{padding:16px 20px;border-bottom:1px solid var(--border)}
.drawer-head h2{font-size:18px;font-weight:800}
.drawer-items{padding:8px 20px}
.d-item{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--border)}
.d-item-img{width:56px;height:56px;border-radius:12px;overflow:hidden;background:var(--surface);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.d-item-img img{width:100%;height:100%;object-fit:cover}
.d-item-info{flex:1;min-width:0}
.d-item-name{font-size:15px;font-weight:600}
.d-item-price{font-size:13px;color:var(--muted)}
.qty-ctrl{display:flex;align-items:center;gap:8px}
.qty-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s ease}
.qty-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.qty-num{font-size:15px;font-weight:700;min-width:20px;text-align:center}
.note-box{margin:16px 20px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow-sm)}
.note-box label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:8px}
.note-box textarea{width:100%;background:transparent;border:none;color:var(--text);font-family:inherit;font-size:14px;resize:none;outline:none;min-height:60px}
.drawer-footer{padding:16px 20px}
.total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.total-label{font-size:15px;color:var(--muted);font-weight:600}
.total-val{font-size:24px;font-weight:800;color:var(--accent2)}
.order-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--accent),#1e3932);border:none;border-radius:var(--radius);color:#fff;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;box-shadow:var(--shadow-md);letter-spacing:0;transition:all .2s ease}
.order-btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-lg)}
.order-btn:active{transform:scale(0.98)}

.success{display:none;position:fixed;inset:0;background:var(--bg);z-index:500;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px}
.success.show{display:flex}
.success h2{font-size:26px;font-weight:800;margin-bottom:12px;color:var(--text)}
.success p{color:var(--muted);font-size:15px;line-height:1.6}
.oid-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 32px;margin:24px 0;box-shadow:var(--shadow-md)}
.oid-box span{color:var(--muted);font-size:12px;display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.oid-box strong{font-size:32px;font-weight:800;color:var(--accent);letter-spacing:2px}
.back-btn{background:var(--card);border:1px solid var(--border);color:var(--text);padding:14px 32px;border-radius:var(--radius);font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;margin-top:12px;box-shadow:var(--shadow-sm);transition:all .2s ease}
.back-btn:hover{background:var(--surface)}

.pb-safe{padding-bottom:90px}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--muted);font-size:14px}
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div class="brand">Bánh mì QR Order</div>
    <div class="table-pill" id="tablePill">Mang đi</div>
  </div>
</div>

<div class="cats" id="cats"></div>

<div class="menu-area pb-safe" id="menuArea">
  <div class="loading">Đang tải menu...</div>
</div>

<div class="cart-bar" id="cartBar">
  <button class="cart-main-btn" onclick="openCart()">
    <span>Xem giỏ hàng</span>
    <div style="display:flex;align-items:center;gap:10px">
      <span id="cartTotal">0đ</span>
      <div class="cart-bubble" id="cartCount">0</div>
    </div>
  </button>
</div>

<div class="overlay" id="overlay" onclick="closeCart()"></div>

<div class="drawer" id="drawer">
  <div class="drawer-bar"></div>
  <div class="drawer-head"><h2>Giỏ hàng</h2></div>
  <div class="drawer-items" id="drawerItems"></div>
  <div class="note-box">
    <label>Ghi chú</label>
    <textarea id="noteInput" placeholder="Ít cay, không hành, thêm đá..."></textarea>
  </div>
  <div class="drawer-footer">
    <div class="total-row">
      <span class="total-label">Tổng cộng</span>
      <span class="total-val" id="drawerTotal">0đ</span>
    </div>
    <button class="order-btn" onclick="placeOrder()">ĐẶT MÓN NGAY</button>
  </div>
</div>

<div class="success" id="successScreen">
  <div class="success-icon" style="width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--green),#059669);display:flex;align-items:center;justify-content:center;margin-bottom:16px;animation:pop .5s"><svg width="36" height="36" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg></div>
  <h2>Đặt món thành công!</h2>
  <p>Nhà hàng đã nhận đơn của bạn<br/>và đang chuẩn bị. Vui lòng chờ!</p>
  <div class="oid-box">
    <span>Mã đơn hàng</span>
    <strong id="successOID">---</strong>
  </div>
  <button class="back-btn" onclick="backToMenu()">Quay lại menu</button>
</div>

<script>
const params = new URLSearchParams(location.search);
const tableId = params.get('table') || 'takeaway';
const socket = io();

let menu = [];
let cats = [];
let cart = [];
let activeCat = 'all';

document.getElementById('tablePill').textContent = tableId === 'takeaway' ? 'Mang đi' : 'Bàn ' + tableId;

// Load menu
fetch('/api/menu')
  .then(r => r.json())
  .then(data => {
    cats = (data.categories || []).map(c => c.name || c);
    menu = (data.items || []).map(item => ({
      id: item._id, name: item.name, price: item.price,
      category: item.category_id || 'Khác',
      image: item.image || '', available: !item.is_hidden
    }));
    renderCats();
    renderMenu();
  })
  .catch(() => {
    document.getElementById('menuArea').innerHTML = '<div class="loading">Không thể tải menu</div>';
  });

socket.on('menu-updated', () => {
  fetch('/api/menu').then(r => r.json()).then(data => {
    cats = (data.categories || []).map(c => c.name || c);
    menu = (data.items || []).map(item => ({
      id: item._id, name: item.name, price: item.price,
      category: item.category_id || 'Khác',
      image: item.image || '', available: !item.is_hidden
    }));
    renderCats();
    renderMenu();
  });
});

function renderCats() {
  const el = document.getElementById('cats');
  // Remove duplicate categories using Set
  const uniqueCats = [...new Set(cats)];
  const all = ['Tất cả', ...uniqueCats];
  el.innerHTML = all.map((c, i) =>
    `<button class="cat-btn${i === 0 ? ' active' : ''}" onclick="filterCat('${i === 0 ? 'all' : c}', this)">${c}</button>`
  ).join('');
}

function filterCat(c, btn) {
  activeCat = c;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderMenu();
}

function renderMenu() {
  let filtered = menu.filter(m => m.available !== false);
  if (activeCat !== 'all') filtered = filtered.filter(m => m.category === activeCat);

  const grouped = {};
  filtered.forEach(item => {
    const c = item.category || 'Khác';
    if (!grouped[c]) grouped[c] = [];
    grouped[c].push(item);
  });

  const area = document.getElementById('menuArea');
  if (!filtered.length) { area.innerHTML = '<div class="loading">Không có món nào</div>'; return; }

  // Sort categories to ensure consistent order
  const sortedCats = Object.keys(grouped).sort();
  
  area.innerHTML = sortedCats.map(cat => {
    const items = grouped[cat];
    return `<div class="sec-title">${esc(cat)}</div>
    <div class="grid">${items.map(item => {
      const inCart = cart.find(c => c.id === item.id);
      const imgHtml = item.image
        ? `<img src="${esc(item.image)}" alt="${esc(item.name)}" onerror="this.parentElement.innerHTML='<div class=placeholder-icon>No image</div>'">`
        : `<div class="placeholder-icon">No image</div>`;
      return `<div class="card" onclick="addToCart('${item.id}')">
        <div class="card-img">${imgHtml}</div>
        ${inCart ? `<div class="card-qty">${inCart.quantity}</div>` : ''}
        <div class="card-body">
          <div class="card-name">${esc(item.name)}</div>
          <div class="card-price">${fmt(item.price)}</div>
        </div>
        <button class="card-plus">+</button>
      </div>`;
    }).join('')}</div>`;
  }).join('');
}

function addToCart(id) {
  const item = menu.find(m => m.id === id);
  if (!item) return;
  const ex = cart.find(c => c.id === id);
  if (ex) ex.quantity++; else cart.push({ ...item, quantity: 1 });
  updateCartUI();
  renderMenu();
}

function updateCartUI() {
  const total = cart.reduce((s, i) => s + i.price * i.quantity, 0);
  const count = cart.reduce((s, i) => s + i.quantity, 0);
  document.getElementById('cartTotal').textContent = fmt(total);
  document.getElementById('cartCount').textContent = count;
  document.getElementById('drawerTotal').textContent = fmt(total);
  document.getElementById('cartBar').classList.toggle('show', count > 0);
  renderDrawerItems();
}

function renderDrawerItems() {
  const el = document.getElementById('drawerItems');
  if (!cart.length) { el.innerHTML = '<p style="color:var(--muted);text-align:center;padding:20px">Chưa có món nào</p>'; return; }
  el.innerHTML = cart.map((item, i) => {
    const imgHtml = item.image
      ? `<img src="${esc(item.image)}" onerror="this.style.display='none'">`
      : '<span style="font-size:24px;opacity:.4">🍽️</span>';
    return `<div class="d-item">
      <div class="d-item-img">${imgHtml}</div>
      <div class="d-item-info">
        <div class="d-item-name">${esc(item.name)}</div>
        <div class="d-item-price">${fmt(item.price)}</div>
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="changeQty(${i},-1)">−</button>
        <span class="qty-num">${item.quantity}</span>
        <button class="qty-btn" onclick="changeQty(${i},1)">+</button>
      </div>
    </div>`;
  }).join('');
}

function changeQty(i, d) {
  cart[i].quantity += d;
  if (cart[i].quantity <= 0) cart.splice(i, 1);
  updateCartUI();
  renderMenu();
}

function openCart() {
  document.getElementById('drawer').classList.add('open');
  document.getElementById('overlay').classList.add('show');
}
function closeCart() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

function placeOrder() {
  if (!cart.length) return;
  const note = document.getElementById('noteInput').value;
  fetch('/api/orders', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      table_id: tableId,
      items: cart.map(i => ({ id: i.id, name: i.name, price: i.price, quantity: i.quantity })),
      notes: note
    })
  })
  .then(r => r.json())
  .then(data => {
    if (data.success) {
      document.getElementById('successOID').textContent = data.order_id;
      document.getElementById('successScreen').classList.add('show');
      cart = [];
      updateCartUI();
      document.getElementById('noteInput').value = '';
    } else { alert('Lỗi: ' + (data.error || 'Không thể đặt món')); }
  })
  .catch(err => alert('Lỗi kết nối: ' + err.message));
  closeCart();
}

function backToMenu() { document.getElementById('successScreen').classList.remove('show'); }
function fmt(n) { return (n || 0).toLocaleString('vi') + 'đ'; }
function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
</script>
</body>
</html>
